# ClamAV overrides for all-in-one MailHook container.
# Listens on TCP (not Unix socket) so mailhook can reach it at 127.0.0.1:3310.
TCPSocket 3310
TCPAddr 127.0.0.1

# Disable the default Unix socket to avoid conflicts
LocalSocket /dev/null

# Log to stdout for Docker log capture
LogSyslog no
LogFile /dev/stdout
LogVerbose no
