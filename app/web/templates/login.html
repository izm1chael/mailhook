{{define "login.html"}}<!DOCTYPE html>
<html lang="en">
<head>
{{template "head" .}}
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center dark:bg-gray-900">
<div class="w-full max-w-sm">
  <div class="flex justify-center mb-8">
    <img src="/static/logo-stacked.svg" alt="MailHook" width="160" class="rounded-2xl shadow-md">
  </div>
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md px-8 py-8">
    {{if .Error}}
    <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">{{.Error}}</div>
    {{end}}
    <!-- nosemgrep: python.django.security.django-no-csrf-token.django-no-csrf-token -->
    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
      </div>
      <button type="submit"
        class="w-full bg-gray-900 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors mt-2">
        Sign in
      </button>
    </form>
  </div>
</div>
</body>
</html>{{end}}
