# Enable Bayes classifier with file-based backend (no Redis dependency)
# Learns from user feedback via /api/learn-spam and /api/release-learn endpoints
classifier "bayes" {
    tokenizer {
        name = "osb";
    }
    backend = "sqlite3";
    sqlite3 {
        path = "/var/lib/rspamd/bayes.db";
    }
    autolearn = true;
    min_tokens = 11;
}
