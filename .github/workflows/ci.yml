name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libyara-dev libssl-dev

      - name: Vet
        run: cd app && go vet ./...

      - name: Test
        run: cd app && CGO_ENABLED=1 go test ./... -timeout 60s -race

  build-check:
    name: Build check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libyara-dev libssl-dev

      - name: Build
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          cd app
          CGO_ENABLED=1 go build \
            -tags yara_static \
            -trimpath \
            -ldflags="-s -w -X main.version=ci-${SHORT_SHA:0:8}" \
            -o /dev/null \
            .

  security:
    name: Security scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    # CGO must be enabled so the scanners can load the go-yara cgo package.
    # Without this (and libyara-dev below) govulncheck/gosec fail with
    # "could not import C (no metadata for C)".
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libyara-dev libssl-dev

      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-file: app/go.mod
          work-dir: app

      # gosec runs on the host (not the containerized action) so it can load the
      # cgo go-yara package against the libyara-dev installed above.
      # -exclude=G104: unhandled-error rule is redundant with go vet/errcheck and
      #   extremely noisy on w.Write/flush in HTTP+SSE handlers where the error is
      #   unactionable (client already gone).
      # -exclude-dir: cmd/* (bench/seed/simulate/soak) and the IMAP testserver are
      #   dev/benchmark/test tooling, not part of the shipped gateway's attack surface.
      # Remaining production false positives are annotated inline with `#nosec Gxxx`.
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd app && gosec -exclude=G104 -exclude-dir=cmd -exclude-dir=testserver ./...

      # Second pass in SARIF format for Code Scanning. Runs after the text-output
      # pass above so a failure there blocks the job before we attempt the upload.
      - name: gosec (SARIF)
        run: |
          cd app && gosec -exclude=G104 -exclude-dir=cmd -exclude-dir=testserver -fmt sarif -out ../gosec-results.sarif ./... || true

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: gosec-results.sarif
          category: gosec

      - name: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Install ONNX Runtime headers (for AI-tag security scan)
        env:
          ONNX_VERSION: "1.18.0"
        run: |
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/onnxruntime-linux-x64-${ONNX_VERSION}.tgz" \
            | sudo tar xz --strip-components=1 -C /usr/local
          sudo ldconfig

      - name: gosec (AI tag)
        env:
          CGO_CFLAGS: "-I/usr/local/include/onnxruntime"
          CGO_LDFLAGS: "-L/usr/local/lib -lonnxruntime"
        run: |
          cd app && gosec -tags ai -exclude=G104 -exclude-dir=cmd -exclude-dir=testserver ./...

  build-check-ai:
    name: Build check (AI)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libyara-dev libssl-dev

      - name: Install ONNX Runtime headers
        env:
          ONNX_VERSION: "1.18.0"
        run: |
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/onnxruntime-linux-x64-${ONNX_VERSION}.tgz" \
            | sudo tar xz --strip-components=1 -C /usr/local
          sudo ldconfig

      - name: Build (AI tag — models absent, compile-only check)
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          cd app
          CGO_ENABLED=1 \
            CGO_CFLAGS="-I/usr/local/include/onnxruntime" \
            CGO_LDFLAGS="-L/usr/local/lib -lonnxruntime" \
            go build \
            -tags "yara_static ai" \
            -trimpath \
            -ldflags="-s -w -X main.version=ci-${SHORT_SHA:0:8}" \
            -o /dev/null \
            .
