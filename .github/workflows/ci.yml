name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libyara-dev libssl-dev

      - name: Vet
        run: cd app && go vet ./...

      - name: Test
        run: cd app && CGO_ENABLED=1 go test ./... -timeout 60s -race

  build-check:
    name: Build check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libyara-dev libssl-dev

      - name: Build
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          cd app
          CGO_ENABLED=1 go build \
            -tags yara_static \
            -trimpath \
            -ldflags="-s -w -X main.version=ci-${SHORT_SHA:0:8}" \
            -o /dev/null \
            .

  security:
    name: Security scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: app/go.mod
          work-dir: app

      - name: gosec
        uses: securego/gosec@9c4bb74a6258fe3818db8354b376ecca985704aa  # v2.26.1
        with:
          args: ./app/...

      - name: trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Install ONNX Runtime headers (for AI-tag security scan)
        env:
          ONNX_VERSION: "1.18.0"
        run: |
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/onnxruntime-linux-x64-${ONNX_VERSION}.tgz" \
            | sudo tar xz --strip-components=1 -C /usr/local
          sudo ldconfig

      - name: gosec (AI tag)
        uses: securego/gosec@9c4bb74a6258fe3818db8354b376ecca985704aa  # v2.26.1
        with:
          args: -tags ai ./app/...
        env:
          CGO_CFLAGS: "-I/usr/local/include/onnxruntime"
          CGO_LDFLAGS: "-L/usr/local/lib -lonnxruntime"

  build-check-ai:
    name: Build check (AI)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libyara-dev libssl-dev

      - name: Install ONNX Runtime headers
        env:
          ONNX_VERSION: "1.18.0"
        run: |
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/onnxruntime-linux-x64-${ONNX_VERSION}.tgz" \
            | sudo tar xz --strip-components=1 -C /usr/local
          sudo ldconfig

      - name: Build (AI tag — models absent, compile-only check)
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          cd app
          CGO_ENABLED=1 \
            CGO_CFLAGS="-I/usr/local/include/onnxruntime" \
            CGO_LDFLAGS="-L/usr/local/lib -lonnxruntime" \
            go build \
            -tags "yara_static ai" \
            -trimpath \
            -ldflags="-s -w -X main.version=ci-${SHORT_SHA:0:8}" \
            -o /dev/null \
            .
